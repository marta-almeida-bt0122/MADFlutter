name: locker_scan
description: "MAD - Control de armarios con QR y Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  logger: ^2.2.0
  shared_preferences: ^2.2.2
  geolocator: ^14.0.0
  path_provider: ^2.0.9
  fluttertoast: ^9.1.0
  intl: ^0.19.0
  sqflite: ^2.0.0+4
  sqflite_common_ffi: ^2.3.0   # needed for Windows/macOS/Linux desktop
  path: ^1.9.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # ─── W13 ────────────────────────────────────────────────────
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_database: ^11.0.0
  mobile_scanner: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
